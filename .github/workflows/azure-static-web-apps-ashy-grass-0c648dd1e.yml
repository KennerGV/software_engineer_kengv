name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v4 # Actualizado a v4 como el tuyo
        with:
          submodules: true
          lfs: false

      # 1. Forzamos la versión de Node que sabés que funciona
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 2. Instalamos y construimos manualmente para asegurar el diseño
      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      # 3. Solo usamos la acción de Azure para SUBIR lo que ya construimos
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_GRASS_0C648DD1E }}
          action: "upload"
          app_location: "/" 
          api_location: "" 
          output_location: "./dist" # Aquí ya están tus archivos con diseño

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
